name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nebula
          POSTGRES_PASSWORD: nebula
          POSTGRES_DB: nebula_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nebula"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd server && uv sync --all-extras --dev

      - name: Lint
        run: cd server && uv run ruff check src

      - name: Format check
        run: cd server && uv run ruff format --check src

      - name: Schema docs up to date
        run: |
          cd server && PYTHONPATH=./src uv run python ../scripts/generate_schema_docs.py
          git diff --exit-code -- docs/SCHEMA.md || (echo "Schema docs are stale. Run 'make docs-schema' and commit." && exit 1)

      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: nebula
          POSTGRES_PASSWORD: nebula
          POSTGRES_DB: nebula_test
        run: |
          cd server
          uv run pytest -q --tb=short \
            --cov=nebula_api --cov=nebula_mcp \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            2>&1 | tee pytest-output.txt

      - name: Generate server badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd server
          TOTAL=$(python3 -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")
          TESTS=$(tail -1 pytest-output.txt | sed 's/ passed.*//' | tr -dc '0-9')
          echo "{\"schemaVersion\":1,\"label\":\"Server Coverage\",\"message\":\"${TOTAL}%\",\"color\":\"$([ $TOTAL -ge 80 ] && echo '22c55e' || echo 'f59e0b')\"}" > server-coverage-badge.json
          echo "$TESTS" > server-test-count.txt

      - name: Upload badge data
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: server-badges
          path: |
            server/server-coverage-badge.json
            server/server-test-count.txt

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/src/go.mod

      - name: Vet
        run: cd cli/src && go vet ./...

      - name: Build
        run: cd cli/src && go build ./...

      - name: Test with coverage
        run: |
          cd cli/src
          go test ./... -count=1 -coverprofile=coverage.out -v 2>&1 | tee go-test-output.txt
          go tool cover -func=coverage.out | tail -1

      - name: Generate CLI badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd cli/src
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print int($3)}')
          CLI_TESTS=$(grep -c "^--- PASS:" go-test-output.txt || echo "0")
          echo "{\"schemaVersion\":1,\"label\":\"CLI Coverage\",\"message\":\"${TOTAL}%\",\"color\":\"$([ $TOTAL -ge 80 ] && echo '22c55e' || echo 'f59e0b')\"}" > cli-coverage-badge.json
          echo "$CLI_TESTS" > cli-test-count.txt

      - name: Upload badge data
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: cli-badges
          path: |
            cli/src/cli-coverage-badge.json
            cli/src/cli-test-count.txt

  badges:
    name: Update badges
    needs: [server, cli]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: server-badges
          path: badges/

      - uses: actions/download-artifact@v4
        with:
          name: cli-badges
          path: badges/

      - name: Generate combined test badge
        run: |
          SERVER_TESTS=$(cat badges/server-test-count.txt 2>/dev/null || echo "0")
          CLI_TESTS=$(cat badges/cli-test-count.txt 2>/dev/null || echo "0")
          TOTAL=$((SERVER_TESTS + CLI_TESTS))
          echo "{\"schemaVersion\":1,\"label\":\"Tests\",\"message\":\"${TOTAL} passing\",\"color\":\"0ea5e9\"}" > badges/tests-badge.json

      - name: Commit badge data
        run: |
          mkdir -p .badges
          cp badges/*.json .badges/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .badges/
          git diff --cached --quiet || git commit -m "chore: update coverage badges [skip ci]"
          git push
