name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nebula
          POSTGRES_PASSWORD: nebula
          POSTGRES_DB: nebula_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nebula"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd server && uv sync --all-extras --dev

      - name: Lint
        run: cd server && uv run ruff check src

      - name: Format check
        run: cd server && uv run ruff format --check src

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: nebula
          POSTGRES_PASSWORD: nebula
          POSTGRES_DB: nebula_test
        run: cd server && uv run pytest -q

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/src/go.mod

      - name: Vet
        run: cd cli/src && go vet ./...

      - name: Build
        run: cd cli/src && go build ./...

      - name: Test
        run: cd cli/src && go test ./... -count=1
